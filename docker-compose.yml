services:
  postgres:
    image: postgres:16
    container_name: motor_insurance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: insurance_support
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d insurance_support"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
